# ef-elea-dark theme for Alacritty

colors:
  # Basic values
  primary:
    background: '#222524'
    foreground: '#eaf2ef'
  selection:
    background: '#543040'
  cursor:
    text: '#eaf2ef'
    cursor: '#ef7fa8'
  scrollbar:
    track: '#303332'
    thumb: '#5e6160'

  # Basic hues for foreground values
  red:
    normal: '#ff656a'
    bright: '#ff7a5f'
  green:
    normal: '#7fc87f'
    bright: '#7fca5a'
  yellow:
    normal: '#cac85f'
    bright: '#e0b02f'
  blue:
    normal: '#57aff6'
    bright: '#78afff'
  magenta:
    normal: '#f59acf'
    bright: '#fa90ea'
  cyan:
    normal: '#6fcfd2'
    bright: '#7fcfdf'

  # Basic hues for background values
  background:
    red: '#bd1f30'
    green: '#20a420'
    yellow: '#847020'
    blue: '#2f5f9f'
    magenta: '#b05fcf'
    cyan: '#028099'

  # Diffs
  diff:
    added:
      background: '#20493f'
      foreground: '#a0e0a0'
    removed:
      background: '#5e242f'
      foreground: '#ffbfbf'
    modified:
      background: '#51512f'
      foreground: '#dada90'

  # Graphs
  graph:
    red: '#b52c2c'
    green: '#0fed00'
    yellow: '#f1e00a'
    blue: '#2fafef'
    magenta: '#bf94fe'
    cyan: '#47dfea'

  # Special hues
  search:
    background: '#37493f'
  cursor_guide:
    background: '#894f7a'
  inactive_pane:
    background: '#2b2e2d'
  active_pane:
    background: '#5e6160'
  pane_divider:
    background: '#5d5f63'
  title_bar:
    background: '#35605d'
    foreground: '#ecf0ff'

  # ANSI colors
  normal:
    black: '#303332'
    red: '#bd1f30'
    green: '#20a420'
    yellow: '#847020'
    blue: '#2f5f9f'
    magenta: '#b05fcf'
    cyan: '#028099'
    white: '#eaf2ef'
  bright:
    black: '#969faf'
    red: '#fa7f88'
    green: '#50cf89'
    yellow: '#cfb27f'
    blue: '#62cfef'
    magenta: '#cfaaff'
    cyan: '#60d5c2'
    white: '#ffffff'

# Additional configuration options go here


