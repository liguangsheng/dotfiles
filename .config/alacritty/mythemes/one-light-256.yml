# Base16 One Light 256 - alacritty color config
# Daniel Pfeifer (http://github.com/purpleKarrot)
colors:
  # Default colors
  primary:
    background: '#fafafa'
    foreground: '#383a42'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '#fafafa'
    cursor: '#383a42'

  # Normal colors
  normal:
    black:   '#fafafa'
    red:     '#ca1243'
    green:   '#50a14f'
    yellow:  '#c18401'
    blue:    '#4078f2'
    magenta: '#a626a4'
    cyan:    '#0184bc'
    white:   '#383a42'

  # Bright colors
  bright:
    black:   '#a0a1a7'
    red:     '#ca1243'
    green:   '#50a14f'
    yellow:  '#c18401'
    blue:    '#4078f2'
    magenta: '#a626a4'
    cyan:    '#0184bc'
    white:   '#090a0b'

  indexed_colors:
    - { index: 16, color: '#d75f00' }
    - { index: 17, color: '#986801' }
    - { index: 18, color: '#f0f0f1' }
    - { index: 19, color: '#e5e5e6' }
    - { index: 20, color: '#696c77' }
    - { index: 21, color: '#202227' }
